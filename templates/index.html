<!DOCTYPE html>
<html>
<head>
    <title>VK Scraper 🚀</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            padding: 10px;
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
            font-size: 12px;
        }

        th {
            background: #1e293b;
        }
    </style>
</head>
<body>

<h2>🔥 VK Video Scraper</h2>

<textarea id="urls" placeholder="Paste VK URLs here..."></textarea>

<br>
<button onclick="startScraping()">🚀 Start</button>
<button onclick="copyTable()">📋 Copy</button>
<button onclick="resetTable()">🔄 Reset</button>

<p id="progress"></p>

<table id="table">
<thead>
<tr>
<th>URL</th>
<th>Duration</th>
<th>Title</th>
<th>Views</th>
<th>Date</th>
<th>Profile</th>
<th>Uploader</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function startScraping() {
    let urls = document.getElementById("urls").value.split("\n").filter(u => u.trim() !== "");
    let done = 0;

    for (let url of urls) {
        let res = await fetch("/api/scrape", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({url: url})
        });

        let data = await res.json();
        addRow(data);

        done++;
        document.getElementById("progress").innerText =
            `✅ Done: ${done} / ${urls.length}`;
    }
}

function addRow(data) {
    let row = `
    <tr>
        <td>${data.url}</td>
        <td>${data.duration}</td>
        <td>${data.title}</td>
        <td>${data.views}</td>
        <td>${data.date}</td>
        <td>${data.profile}</td>
        <td>${data.uploader}</td>
    </tr>
    `;
    document.querySelector("#table tbody").innerHTML += row;
}

function copyTable() {
    let text = "";
    document.querySelectorAll("table tr").forEach(row => {
        let cols = row.querySelectorAll("td, th");
        let rowText = Array.from(cols).map(td => td.innerText).join("\t");
        text += rowText + "\n";
    });

    navigator.clipboard.writeText(text);
    alert("Copied!");
}

function resetTable() {
    document.querySelector("#table tbody").innerHTML = "";
    document.getElementById("progress").innerText = "";
}
</script>

</body>
</html>
